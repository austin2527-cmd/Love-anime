<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
body { margin:0; overflow:hidden; background:#000011; }
canvas { display:block; }
#overlay {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    color:white;
    font-size:28px;
    font-family:Arial;
    text-align:center;
    opacity:0;
    transition:2s;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/three@0.134.0/build/three.min.js"></script>
</head>

<body>

<div id="overlay">Divine ❤️ Juan<br>Forever ♾️</div>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3" type="audio/mpeg">
</audio>

<script>

let scene, camera, renderer, clock;
let particles = [];
let phase = 1, phaseTime = 0;
let totalParticles = window.innerWidth < 600 ? 200 : 400;

function init(){
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000011);

    camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
    camera.position.z = 120;

    renderer = new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(innerWidth, innerHeight);
    document.body.appendChild(renderer.domElement);

    clock = new THREE.Clock();

    // HEART TEXTURE ❤️
    const canvas = document.createElement('canvas');
    canvas.width = 64;
    canvas.height = 64;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = "red";
    ctx.font = "40px Arial";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("❤️",32,32);

    const texture = new THREE.CanvasTexture(canvas);

    for(let i=0;i<totalParticles;i++){
        const mat = new THREE.SpriteMaterial({
            map:texture,
            transparent:true,
            blending:THREE.AdditiveBlending
        });

        const sprite = new THREE.Sprite(mat);
        sprite.position.set(
            (Math.random()-0.5)*300,
            (Math.random()-0.5)*300,
            (Math.random()-0.5)*300
        );

        sprite.scale.set(8,8,1);
        scene.add(sprite);
        particles.push(sprite);
    }

    window.addEventListener("resize", resize);
    window.addEventListener("click", startMusic);

    animate();
}

function animate(){
    requestAnimationFrame(animate);
    const time = clock.getElapsedTime();
    const delta = clock.getDelta();
    phaseTime += delta;

    // FLOATING
    if(phase===1){
        particles.forEach(p=>{
            p.position.y += Math.sin(time + p.position.x) * 0.2;
            p.position.x += Math.cos(time + p.position.y) * 0.2;
        });
        if(phaseTime>6){ phase=2; phaseTime=0; }
    }

    // HEART SHAPE ❤️
    else if(phase===2){
        particles.forEach((p,i)=>{
            const t = (i / totalParticles) * Math.PI * 2;
            const x = 16 * Math.sin(t) ** 3;
            const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
            const target = new THREE.Vector3(x * 2, y * 2, 0);

            p.position.lerp(target,0.05);
        });
        if(phaseTime>10){ phase=3; phaseTime=0; }
    }

    // FINAL TEXT
    else if(phase===3){
        document.getElementById("overlay").style.opacity = 1;
    }

    renderer.render(scene,camera);
}

function startMusic(){
    document.getElementById("music").play();
}

function resize(){
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
}

init();

</script>

</body>
</html>
